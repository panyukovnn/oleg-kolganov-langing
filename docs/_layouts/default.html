<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ru' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}">
    <meta property="og:type" content="{{ page.og_type | default: 'website' }}">
    <meta property="og:locale" content="ru_RU">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:title" content="{{ page.og_title | default: page.title }}">
    <meta property="og:description" content="{{ page.og_description | default: page.description }}">
    <link rel="icon" href="{{ '/static/favicon.ico' | relative_url }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ '/static/css/custom/main-style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/static/css/custom/contact-form.css' | relative_url }}">
{%- for css in page.styles %}
    <link rel="stylesheet" href="{{ css | relative_url }}">
{%- endfor %}
{%- for js in page.head_scripts %}
    <script src="{{ js | relative_url }}" defer></script>
{%- endfor %}
{%- if page.jsonld %}
    <script type="application/ld+json">
{{ page.jsonld }}
    </script>
{%- endif %}
</head>
<body class="kn">

{% include header.html %}

{{ content }}

{% include footer.html %}

<script src="{{ '/static/js/custom/contact-form.js' | relative_url }}"></script>
{%- for js in page.body_scripts %}
<script src="{{ js | relative_url }}"></script>
{%- endfor %}
<!-- YClients online booking widget (филиал 2097567) -->
<script type="text/javascript" charset="UTF-8" src="https://w2097567.yclients.com/widgetJS" async></script>
</body>
</html>
